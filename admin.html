<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert Admin | Szerkesztő</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 2rem; max-width: 1100px; margin: 0 auto; display: block; }
        .admin-form { background: var(--card-bg); padding: 2rem; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 2fr 1fr auto; gap: 10px; align-items: end; }
        table { width: 100%; color: white; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        input[type="text"], input[type="number"] { padding: 8px; background: #2a2a2a; border: 1px solid #444; color: white; width: 100%; border-radius: 4px; }
        .btn-update { background: #2ecc71; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-delete { background: #ff4c4c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="login-screen" style="text-align:center; padding-top: 100px;">
        <h1>Sár-Kert Admin Belépés</h1>
        <input type="password" id="pass" placeholder="Jelszó" style="max-width:300px;"><br><br>
        <button class="btn-gold" onclick="login()">Belépés</button>
    </div>

    <div id="admin-content" style="display:none;">
        <h1>Étlap Kezelés</h1>
        <div class="admin-form">
            <div class="form-row">
                <div><label>Kategória</label>
                    <select id="new-cat" style="width:100%; padding:8px; background:#2a2a2a; color:white; border:1px solid #444;">
                        <option>Levesek</option><option>Főételek</option><option>Burgerek</option>
                        <option>Pizzák</option><option>Desszertek</option><option>Italok</option><option>Feltét</option>
                    </select>
                </div>
                <div><label>Név</label><input type="text" id="new-name"></div>
                <div><label>Ár</label><input type="number" id="new-price"></div>
                <button class="btn-gold" onclick="addNew()">Hozzáad</button>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>Látható</th><th>Kategória</th><th>Név</th><th>Ár</th><th style="text-align:right;">Műveletek</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        window.login = () => {
            if(document.getElementById('pass').value === 'Sarkert2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                load();
            } else { alert('Hiba!'); }
        };

        async function load() {
            const { data } = await supabase.from('etlap').select('*').order('kategoria');
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><input type="checkbox" ${item.lathatosag ? 'checked' : ''} onchange="updateVis(${item.id}, this.checked)" style="width:20px; height:20px;"></td>
                    <td style="font-size:0.8rem; color:#888;">${item.kategoria}</td>
                    <td><input type="text" value="${item.nev}" id="n-${item.id}"></td>
                    <td><input type="number" value="${item.ar}" id="p-${item.id}"></td>
                    <td style="text-align:right;">
                        <button class="btn-update" onclick="update(${item.id})">Mentés</button>
                        <button class="btn-delete" onclick="del(${item.id})">X</button>
                    </td>
                </tr>`).join('');
        }

        window.addNew = async () => {
            const item = { kategoria: document.getElementById('new-cat').value, nev: document.getElementById('new-name').value, ar: parseInt(document.getElementById('new-price').value), lathatosag: true };
            await supabase.from('etlap').insert([item]);
            load();
        };

        window.update = async (id) => {
            const n = document.getElementById(`n-${id}`).value;
            const p = parseInt(document.getElementById(`p-${id}`).value);
            await supabase.from('etlap').update({ nev: n, ar: p }).eq('id', id);
            alert('Frissítve!');
        };

        window.updateVis = async (id, s) => {
            await supabase.from('etlap').update({ lathatosag: s }).eq('id', id);
        };

        window.del = async (id) => {
            if(confirm('Törlöd?')) { await supabase.from('etlap').delete().eq('id', id); load(); }
        };
    </script>
</body>
</html>
