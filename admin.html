<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>body { padding: 3rem; background: #000; display: block; }</style>
</head>
<body>
    <div id="login-screen" style="text-align:center; padding-top: 100px;">
        <h1 style="color:white; margin-bottom:20px;">Sár-Kert Adminisztráció</h1>
        <input type="password" id="pass" placeholder="Jelszó" style="max-width:300px;">
        <br>
        <button class="btn-gold-premium" onclick="login()">BELÉPÉS</button>
    </div>
    <div id="admin-content" style="display:none;">
        <h1 style="color:white; margin-bottom:30px;">Étlap Kezelése</h1>
        <div class="glass" style="padding:2rem; margin-bottom:2rem;">
            <div style="display:grid; grid-template-columns: 1fr 2fr 1fr auto; gap:15px; align-items:end;">
                <select id="cat">
                    <option>Levesek</option>
                    <option>Főételek</option>
                    <option>Burgerek</option>
                    <option>Pizzák</option>
                    <option>Desszertek</option>
                    <option>Italok</option>
                </select>
                <input type="text" id="name" placeholder="Étel neve">
                <input type="number" id="price" placeholder="Ár">
                <button class="btn-gold-premium" onclick="save()">MENTÉS</button>
            </div>
        </div>
        <table style="width:100%; border-collapse: collapse; color:white;" id="table">
            <thead><tr style="border-bottom: 1px solid #c5a059;"><th style="padding:15px; text-align:left;">Kategória</th><th style="padding:15px; text-align:left;">Név</th><th style="padding:15px; text-align:left;">Ár</th><th style="padding:15px; text-align:right;">Művelet</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        window.login = () => {
            if(document.getElementById('pass').value === 'Sarkert2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                load();
            } else alert('Helytelen jelszó!');
        };

        async function load() {
            const { data } = await supabase.from('etlap').select('*').order('kategoria');
            document.getElementById('tbody').innerHTML = data.map(i => `
                <tr style="border-bottom: 1px solid #1a1a1a;">
                    <td style="padding:15px;">${i.kategoria}</td>
                    <td style="padding:15px;">${i.nev}</td>
                    <td style="padding:15px;">${i.ar} Ft</td>
                    <td style="padding:15px; text-align:right;">
                        <button class="btn-gold-premium" style="padding:5px 10px; font-size:0.7rem;" onclick="del(${i.id})">TÖRLÉS</button>
                    </td>
                </tr>`).join('');
        }

        window.save = async () => {
            const item = { kategoria: document.getElementById('cat').value, nev: document.getElementById('name').value, ar: parseInt(document.getElementById('price').value) };
            await supabase.from('etlap').insert([item]);
            load();
        };

        window.del = async (id) => {
            if(confirm('Biztosan törlöd?')) {
                await supabase.from('etlap').delete().eq('id', id);
                load();
            }
        };
    </script>
</body>
</html>
