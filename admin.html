<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>body { padding: 2rem; max-width: 1000px; margin: 0 auto; display: block; }</style>
</head>
<body>
    <div id="login-screen" style="text-align:center; padding-top: 100px;">
        <h1>Sár-Kert Admin</h1>
        <input type="password" id="pass" placeholder="Jelszó">
        <button class="btn-gold" onclick="login()">Belépés</button>
    </div>
    <div id="admin-content" style="display:none;">
        <h1>Étlap Kezelő</h1>
        <div class="admin-form" style="background:var(--card-bg); padding:2rem; border:1px solid var(--gold); border-radius:10px; margin-bottom:2rem;">
            <div style="display:grid; grid-template-columns: 1fr 2fr 1fr auto; gap:10px; align-items:end;">
                <select id="cat">
                    <option>Levesek</option>
                    <option>Főételek</option>
                    <option>Burgerek</option>
                    <option>Pizzák</option>
                    <option>Desszertek</option>
                    <option>Italok</option>
                </select>
                <input type="text" id="name" placeholder="Étel neve">
                <input type="number" id="price" placeholder="Ár">
                <button class="btn-gold" onclick="save()">Mentés</button>
            </div>
        </div>
        <table id="table" style="width:100%; color:white;">
            <thead><tr style="text-align:left; border-bottom:1px solid #333;"><th>Kategória</th><th>Név</th><th>Ár</th><th>Művelet</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        window.login = () => {
            if(document.getElementById('pass').value === 'Sarkert2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                load();
            } else alert('Helytelen jelszó!');
        };

        async function load() {
            const { data } = await supabase.from('etlap').select('*').order('kategoria');
            document.getElementById('tbody').innerHTML = data.map(i => `
                <tr style="border-bottom:1px solid #222;">
                    <td style="padding:10px;">${i.kategoria}</td>
                    <td style="padding:10px;">${i.nev}</td>
                    <td style="padding:10px;">${i.ar} Ft</td>
                    <td style="padding:10px;"><button class="btn-gold" style="padding:5px 10px; font-size:0.7rem;" onclick="del(${i.id})">Törlés</button></td>
                </tr>`).join('');
        }

        window.save = async () => {
            const item = { kategoria: document.getElementById('cat').value, nev: document.getElementById('name').value, ar: parseInt(document.getElementById('price').value) };
            await supabase.from('etlap').insert([item]);
            load();
        };

        window.del = async (id) => {
            if(confirm('Törlöd?')) {
                await supabase.from('etlap').delete().eq('id', id);
                load();
            }
        };
    </script>
</body>
</html>
