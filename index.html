<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sár-Kert Étterem | Rendelés</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Sár-Kert Étterem</h1>
            <div class="cart-icon" id="cart-icon">
                <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main>
        <nav class="categories" id="category-nav"></nav>
        <div class="menu-container" id="menu-container"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Sár-Kert Étterem</h3>
                <p>
                    Üzemeltető: Sár-Kert Kft.<br>
                    Székhely: 7030 Paks, Szent János utca 15.<br>
                    Adószám: 32347278-2-17<br>
                    Cégjegyzékszám: 17 09 013742<br>
                    0620 530 5848 | info@sarkertpaks.hu
                </p>
            </div>
            <div class="footer-section">
                <h3>Jogi Információk</h3>
                <ul>
                    <li><a href="#">ÁSZF</a></li>
                    <li><a href="#">Adatkezelési Tájékoztató</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title"></h2>
            <p id="modal-price" class="gold-text"></p>
            <div id="modal-options"></div>
            <button id="add-to-cart-btn" class="btn-gold">Kosárba teszem (+200 Ft csomagolás)</button>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Kosaram</h2>
            <span class="close-cart">&times;</span>
        </div>
        <div class="cart-scroll-area">
            <div id="cart-items"></div>
            <div class="cart-total" style="padding: 1rem 0; border-top: 2px solid #c5a059; margin-top: 1rem; display: flex; justify-content: space-between; font-size: 1.2rem;">
                <span>Összesen:</span> <span id="total-price" class="gold-text">0 Ft</span>
            </div>
            <div class="checkout-section">
                <h3>Szállítási adatok</h3>
                <form id="checkout-form">
                    <input type="text" id="order-name" placeholder="Név" required>
                    <input type="text" id="order-address" placeholder="Utca, házszám" required>
                    <div class="form-row">
                        <input type="text" id="order-floor" placeholder="Em./Ajtó">
                        <input type="text" id="order-bell" placeholder="Csengő">
                    </div>
                    <input type="tel" id="order-phone" placeholder="Telefonszám" required>
                    <select id="order-payment" required>
                        <option value="" disabled selected>Fizetés...</option>
                        <option value="Készpénz">Készpénz futárnál</option>
                        <option value="Bankkártya">Kártya futárnál</option>
                        <option value="OTP SZÉP">OTP SZÉP Kártya</option>
                    </select>
                    <label style="font-size: 0.8rem; color: #888; display: block; margin-bottom: 1rem;">
                        <input type="checkbox" required> Elfogadom a feltételeket.
                    </label>
                    <button type="submit" class="btn-gold">Rendelés Leadása</button>
                </form>
            </div>
        </div>
    </div>
    <div id="overlay" class="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:400;"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
