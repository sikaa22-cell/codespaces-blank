<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert | Pincér Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 2rem; max-width: 800px; margin: 0 auto; display: block; }
        .order-card { background: var(--card-bg); border: 1px solid var(--gold); padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h1>Élő Rendelések</h1>
        <button id="enable-notifications" class="btn-gold">🔔 Értesítések bekapcsolása</button>
    </div>
    <div id="orders-container"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        const container = document.getElementById('orders-container');
        const alertSound = document.getElementById('alert-sound');

        document.getElementById('enable-notifications').onclick = () => {
            Notification.requestPermission().then(p => { if(p === 'granted') alert('Értesítések aktívak!'); });
        };

        function renderOrder(order) {
            const div = document.createElement('div');
            div.className = 'order-card';
            div.innerHTML = `
                <h3>${order.nev} - ${order.telefon}</h3>
                <p>📍 Cím: <strong>${order.cim}</strong></p>
                <p style="color:var(--gold);">💳 Fizetés: ${order.fizetesi_mod}</p>
                <ul>${order.tetelek.map(t => `<li>${t.nev}</li>`).join('')}</ul>
                <h2 class="gold-text">${order.vegosszeg} Ft</h2>
                <button class="btn-gold block" onclick="this.parentElement.remove()">Kész / Törlés</button>
            `;
            container.prepend(div);
        }

        supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rendelesek' }, payload => {
            renderOrder(payload.new);
            alertSound.loop = true;
            alertSound.play();
            setTimeout(() => { alertSound.pause(); alertSound.currentTime = 0; }, 10000);
            if (Notification.permission === "granted") {
                new Notification("ÚJ RENDELÉS!", { body: `${payload.new.nev} - ${payload.new.vegosszeg} Ft`, requireInteraction: true });
            }
        }).subscribe();
    </script>
</body>
</html>
