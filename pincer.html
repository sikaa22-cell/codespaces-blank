<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert | Pincér Napló</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 2rem; max-width: 900px; margin: 0 auto; background: #121212; color: #f0f0f0; }
        .order-card { background: #1e1e1e; border: 2px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 12px; position: relative; transition: 0.3s; }
        .order-card.new { border-color: #ff4c4c; animation: pulse 2s infinite; }
        .order-card.accepted { border-color: #2ecc71; background: #1a2a1f; }
        .order-num { position: absolute; top: -15px; left: 20px; background: #c5a059; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        #custom-toast { position: fixed; bottom: -200px; right: 20px; background: #c5a059; color: #000; padding: 20px; border-radius: 10px; transition: 0.5s; z-index: 10000; }
        #custom-toast.show { bottom: 20px; }
        @keyframes pulse { 0% { border-color: #ff4c4c; } 50% { border-color: #333; } 100% { border-color: #ff4c4c; } }
    </style>
</head>
<body>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h1>👨‍🍳 Rendelés Napló</h1>
        <button id="enable-notifications" class="btn-gold">🔔 Rendszer Aktiválása</button>
    </div>
    <div id="orders-container"></div>
    <div id="custom-toast"><h4>ÚJ RENDELÉS!</h4><p id="toast-details"></p></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        let orderCount = parseInt(localStorage.getItem('sarkert_count')) || 0;
        const alertSound = document.getElementById('alert-sound');

        document.getElementById('enable-notifications').onclick = () => {
            Notification.requestPermission();
            alertSound.play(); alertSound.pause();
            alert('A pincér rendszer készenlétben!');
        };

        function renderOrder(order, isNew = false) {
            if(isNew) { orderCount++; localStorage.setItem('sarkert_count', orderCount); }
            const div = document.createElement('div');
            div.className = `order-card ${isNew ? 'new' : ''}`;
            div.id = `order-${order.id}`;
            div.innerHTML = `
                <div class="order-num">#${orderCount}</div>
                <h3>${order.nev} | ${order.telefon}</h3>
                <p>📍 ${order.cim}</p>
                <p>💳 ${order.fizetesi_mod}</p>
                <ul style="margin:10px 0;">${order.tetelek.map(t => `<li>${t.nev}</li>`).join('')}</ul>
                <h2 style="color:#c5a059;">${order.vegosszeg} Ft</h2>
                <div class="btn-group">
                    <button class="btn-gold" style="background:#2ecc71;" onclick="accept('${order.id}')">ELFOGAD</button>
                    <button class="btn-gold" style="background:#555;" onclick="this.parentElement.parentElement.style.opacity='0.3'; this.parentElement.remove()">LEZÁRÁS</button>
                </div>
            `;
            document.getElementById('orders-container').prepend(div);
        }

        window.accept = (id) => {
            const card = document.getElementById(`order-${id}`);
            card.classList.remove('new'); card.classList.add('accepted');
            alertSound.pause(); alertSound.currentTime = 0;
        };

        supabase.channel('pincer').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rendelesek' }, payload => {
            renderOrder(payload.new, true);
            alertSound.loop = true; alertSound.play();
            setTimeout(() => { alertSound.pause(); alertSound.loop = false; }, 12000); 
            document.getElementById('toast-details').innerText = `${payload.new.nev} (#${orderCount})`;
            document.getElementById('custom-toast').classList.add('show');
            setTimeout(() => document.getElementById('custom-toast').classList.remove('show'), 8000);
        }).subscribe();
    </script>
</body>
</html>
