<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert | Pincér Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 2rem; max-width: 800px; margin: 0 auto; display: block;">
    <h1>Élő Rendelések</h1>
    <button id="enable-notifications" class="btn-gold">🔔 Értesítések bekapcsolása</button>
    <div id="orders-container" style="margin-top:20px;"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        const container = document.getElementById('orders-container');
        const alertSound = document.getElementById('alert-sound');

        document.getElementById('enable-notifications').onclick = () => {
            Notification.requestPermission();
            alert('Rendszer aktív!');
        };

        function renderOrder(order) {
            const div = document.createElement('div');
            div.style.background = '#1e1e1e';
            div.style.border = '1px solid #c5a059';
            div.style.padding = '20px';
            div.style.marginBottom = '15px';
            div.innerHTML = `
                <h3>${order.nev} | ${order.telefon}</h3>
                <p>📍 Cím: ${order.cim}</p>
                <ul style="margin:10px 0;">${order.tetelek.map(t => `<li>${t.nev}</li>`).join('')}</ul>
                <h2 style="color:#c5a059;">${order.vegosszeg} Ft</h2>
                <button class="btn-gold" style="width:100%" onclick="this.parentElement.remove()">KÉSZ / TÖRLÉS</button>
            `;
            container.prepend(div);
        }

        supabase.channel('rendelesek').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rendelesek' }, payload => {
            renderOrder(payload.new);
            alertSound.play();
        }).subscribe();
    </script>
</body>
</html>
