<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sár-Kert | Pincér Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 3rem; background: #000; display: block; }
        .order-card { background: #111; border-left: 4px solid #c5a059; padding: 2rem; margin-bottom: 1.5rem; animation: fadeIn 0.5s ease; }
        .order-card h3 { color: #fff; margin-bottom: 1rem; }
        .order-card p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:40px;">
        <h1 style="color:white;">Élő Rendelések</h1>
        <button id="enable-notifications" class="btn-gold-premium">🔔 Rendszer Aktiválása</button>
    </div>
    <div id="orders-container"></div>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://stbdqxydmzlflnvsogde.supabase.co', 'sb_publishable_-mQj4leakzhkMZNuiAgYZg_EARP4OUD');
        
        const container = document.getElementById('orders-container');
        const alertSound = document.getElementById('alert-sound');

        document.getElementById('enable-notifications').onclick = () => {
            Notification.requestPermission();
            alert('A pincér riasztó rendszer aktív!');
        };

        function renderOrder(order) {
            const div = document.createElement('div');
            div.className = 'order-card';
            div.innerHTML = `
                <h3>${order.nev} | ${order.telefon}</h3>
                <p>📍 Cím: ${order.cim}</p>
                <p style="color:#c5a059; margin: 10px 0;">💳 Fizetés: ${order.fizetesi_mod}</p>
                <ul style="margin: 15px 0;">${order.tetelek.map(t => `<li>${t.nev}</li>`).join('')}</ul>
                <h2 style="color:white; margin-bottom: 20px;">${order.vegosszeg} Ft</h2>
                <button class="btn-gold-premium" style="width:100%" onclick="this.parentElement.remove()">RENDELÉS LEZÁRÁSA</button>
            `;
            container.prepend(div);
        }

        supabase.channel('rendelesek_csatorna')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rendelesek' }, payload => {
            renderOrder(payload.new);
            alertSound.play();
            if (Notification.permission === "granted") new Notification("ÚJ RENDELÉS!");
        }).subscribe();
    </script>
</body>
</html>
